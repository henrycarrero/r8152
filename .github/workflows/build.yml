name: Build SPK

on:
  workflow_dispatch:
    inputs:
      dsm_version:
        description: 'DSM version (e.g. 7.3)'
        required: true
        default: '7.3'
      platform:
        description: 'Platform (e.g. apollolake)'
        required: true
        default: 'apollolake'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        shell: bash -o pipefail {0}

    steps:
      - name: Checkout r8152 into source/r8152
        uses: actions/checkout@v4
        with:
          path: source/r8152

      - name: Clone pkgscripts-ng
        # pkgscripts must be a sibling of source/ so that
        # SynoBase (dirname of pkgscripts) == GITHUB_WORKSPACE
        run: git clone https://github.com/SynologyOpenSource/pkgscripts-ng.git pkgscripts

      - name: Cache toolkit tarballs
        uses: actions/cache@v4
        with:
          path: toolkit_tarballs
          key: toolkit-${{ github.event.inputs.dsm_version }}-${{ github.event.inputs.platform }}-v1

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q python3 cpio bc kmod

      - name: Deploy build environment
        run: |
          mkdir -p toolkit_tarballs
          cd pkgscripts
          sudo ./EnvDeploy \
            -v ${{ github.event.inputs.dsm_version }} \
            -p ${{ github.event.inputs.platform }} \
            -t $GITHUB_WORKSPACE/toolkit_tarballs \
            2>&1 | tee /tmp/envdeploy.log
          echo "--- EnvDeploy complete ---"
          ls $GITHUB_WORKSPACE/build_env/ 2>/dev/null || echo "build_env not found"

      - name: Build package
        run: |
          cd pkgscripts
          sudo ./PkgCreate.py \
            -v ${{ github.event.inputs.dsm_version }} \
            -p ${{ github.event.inputs.platform }} \
            -S \
            r8152 2>&1 | tee /tmp/pkgcreate.log

      - name: Collect SPK
        run: |
          mkdir -p output
          find $GITHUB_WORKSPACE/build_env \
               $GITHUB_WORKSPACE -maxdepth 1 \
               -name "*.spk" 2>/dev/null | while read f; do
            echo "Found SPK: $f"
            cp "$f" output/
          done
          ls -lh output/

      - name: Upload SPK
        uses: actions/upload-artifact@v4
        with:
          name: r8152-${{ github.event.inputs.platform }}-${{ github.event.inputs.dsm_version }}
          path: output/*.spk
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /tmp/envdeploy.log
            /tmp/pkgcreate.log
